<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Enrollment Billing System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .animate-fade-in{
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
        }

            to {
                opacity: 1;
                transform: translateY(0);
            }

            .card-hover:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
                border-color: rgba(96, 165, 250, 0.4);
            }

            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: #020617;
            }

            ::-webkit-scrollbar-thumb {
                background: #1e293b;
                border-radius: 4px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #334155;
            }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_BASE = 'http://localhost:8000';

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [history, setHistory] = useState([]);
            const [uploading, setUploading] = useState(false);
            const [activeTab, setActiveTab] = useState('upload');
            const [dragActive, setDragActive] = useState(false);
            const [dateEnded, setDateEnded] = useState('');
            const fileInputRef = useRef(null);

            useEffect(() => {
                fetchHistory();
            }, []);

            const fetchHistory = async () => {
                try {
                    const response = await axios.get(`${API_BASE}/history`);
                    setHistory(response.data.reverse());
                } catch (err) {
                    console.error("Failed to fetch history", err);
                }
            };

            const handleFileUpload = async (file) => {
                if (!file) return;

                if (!dateEnded) {
                    alert("Please select a Date Ended before uploading.");
                    return;
                }

                const formData = new FormData();
                formData.append('file', file);
                formData.append('date_ended', dateEnded);

                setUploading(true);
                try {
                    await axios.post(`${API_BASE}/upload`, formData);
                    await fetchHistory();
                    setActiveTab('history');
                    setDateEnded(''); // Reset date after successful upload
                } catch (err) {
                    alert(err.response?.data?.detail || "Upload failed");
                    } finally {
                        setUploading(false);
                }
            };

            const onDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === "dragenter" || e.type === "dragover") {
                    setDragActive(true);
                } else if (e.type === "dragleave") {
                    setDragActive(false);
                }
            };

            const onDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0])  {
                    handleFileUpload(e.dataTransfer.files[0]);
                }
            };

            const triggerFileInput = () => {
                fileInputRef.current.click();
            };

            const handleFileChange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    handleFileUpload(e.target.files[0]);
                }
            };

            const downloadFile = (filename) => {
                window.open(`${API_BASE}/download/${filename}`, '_blank');
            };

            return {
                <div className="max-w-6xl mx-auto px-4 py-8">
                    <header className="mb-12 text-center">
                        <h1 className="text-5xl font-extrabold mb-4 gradient-text tracking-tight">AgentBilling</h1>
                        <p className="text-slate-400 text-lg">Calculate enrollment fees and generate payment summaries with precision.</p>
                    </header>

                    <div className="flex justify-center mb-8">
                        <div className="inline-flex p-1 bg-slate-800/50 rounded-xl border border-slate-700 glass">
                            <button
                                onClick={() => setActiveTab('upload')}
                                className={`px-6 py-2 rounded-lg font-medium transition-all duration-200 flex items-center gap-2 ${activeTab === 'upload' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}
                            >
                                <Icon name="upload" size={18} /> Upload File
                            </button>
                            <button
                                onClick={() => setActiveTab('history')}
                                className={`px-6 py-2 rounded-lg font-medium transition-all duration-200 flex items-center gap-2 ${activeTab === 'history' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}
                            >
                                <Icon name="history" size={18} /> History
                            </button>
                        </div>
                    </div>

                    <main className="animate-fade-in">
                        {activeTab === 'upload' ? (
                            <div className="max-w-2xl mx-auto">
                                {/* Date Ended Selector */}
                                <div className="mb-8 glass rounded-2xl p-6 border border-slate-700/50">
                                    <label className="block mb-3">
                                        <span className="text-lg font-semibold flex items-center gap-2">
                                            <Icon name="calendar" size={20} className="text-blue-400" />
                                            Date Ended
                                        </span>
                                        <span className="text-sm text-slate-400 mt-1 block">
                                            Select the end date for this billing period
                                        </span>
                                    </label>
                                    <input
                                        type="date"
                                        value={dateEnded}
                                        onChange={(e) => setDateEnded(e.target.value)}
                                        className="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-xl text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                                        required
                                    />
                                </div>

                                <div
                                    onDragEnter={onDrag}
                                    onDragLeave={onDrag}
                                    onDragOver={onDrag}
                                    onDrop={onDrop}
                                    onClick={triggerFileInput}
                                    className={`relative group cursor-pointer border-2 border-dashed rounded-3xl p-16 text-center transition-all duration-300 glass ${dragActive ? 'border-blue-500 bg-blue-500/10' : 'border-slate-700 hover:border-slate-500 hover:bg-slate-800/30'}`}
                                >
                                    <input
                                        ref={fileInputRef}
                                        type="file"
                                        className="hidden"
                                        accept=".csv"
                                        onChange={handleFileChange}
                                    />

                                    <div className="flex flex-col items-center">
                                        <div className="w-20 h-20 mb-6 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-400 group-hover:scale-110 transition-transform duration-300">
                                            <Icon name="file-text" size={40} />
                                        </div> 
                                        <h3 className="text-2xl font-semibold mb-2">Drop your CSV here</h3>
                                        <p className="text-slate-400 mb-8 max-w-sm">
                                            Accepts 'sample file.csv' format.
                                            We'll handle the calculations for all agents automatically.
                                        </p>

                                        {uploading ? (
                                            <div className="flex items-center gap-3 bg-blue-600 px-8 py-3 rounded-xl font-bold">
                                                <div className="animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></div>
                                                Processing...
                                            </div>
                                        ) : (
                                            <button className="bg-slate-100 text-slate-900 px-8 py-3 rounded-xl font-bold hover:bg-white transition-colors">
                                                Browse Files
                                            </button>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="mt-12 grid grid-cols-2 gap-6">
                                    <div className="p-6 rounded-2xl glass border-l-4 border-l-blue-500">
                                        <h4 className="font-bold mb-2">Incremental Pricing Tiers</h4>
                                        <ul className="text-sm text-slate-400 space-y-1">
                                            <li>1 - 30 BVNs: 100 ₦ each</li>
                                            <li>31 - 60 BVNs: 125 ₦ each</li>
                                            <li>61 - 90 BVNs: 150 ₦ each</li>
                                            <li>91 - 120 BVNs: 175 ₦ each</li>
                                            <li>120+ BVNs: 200 ₦ each</li>
                                        </ul>
                                    </div>
                                    <div className="p-6 rounded-2xl glass border-l-4 border-l-purple-500">
                                        <h4 className="font-bold mb-2">Outputs</h4>
                                        <ul className="text-sm text-slate-400 space-y-1">
                                            <li>• Payment File (by Super Agent)</li>
                                            <li>• Agent Detail Summaries</li>
                                            <li>• Historical Record</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4>  max-w-4xl mx-auto">
                                {history.length === 0 ? (
                                    <div className="text-center py-20 glass rounded-3xl">
                                        <Icon name="folder-open" size={48} className="mx-auto text-slate-600 mb-4" />
                                        <p className="text-slate-500">No history found. Upload a file to get started.</p>
                                    </div>
                                ) : (
                                    history.map((record) => (
                                        <div key={record.id} className="glass rounded-2xl overflow-hidden border border-slate-700/50 card-hover transition-all duration-300">
                                            <div className="p-6">
                                                <div className="flex justify-between items-start mb-6">
                                                    <div>
                                                        <h3 className="text-xl font-bold flex items-center gap-2">
                                                            <Icon name="file" size={20} className="text-blue-400" />
                                                            {record.original_filename}
                                                        </h3>
                                                        <p className="text-sm text-slate-500 mt-1">
                                                            Processed on {new Date(record.timestamp).toLocaleString()}
                                                        </p>
                                                        {record.date_ended && (
                                                            <p className="text-sm text-blue-400 mt-1 flex items-center gap-1">
                                                                <Icon name="calendar" size={14} />
                                                                Date Ended: {record.date_ended}
                                                            </p>
                                                        )}
                                                    </div>
                                                    <span className="bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">
                                                        Completed
                                                    </span>
                                                </div>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <div className="p-4 bg-slate-800/40 rounded-xl border-slate-700/50">
                                                        <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Main Output</h4>
                                                        <button
                                                            onClick={() => downloadFile(record.payment_file)}
                                                            className="flex items-center justify-between w-full px-4 py-2 bg-blue-600/10 hover:bg-blue-600/20 text-blue-600/20 text-blue-400 rounded-lg transition-colors group"
                                                        >
                                                            <span className ="font-medium">{record.payment_file}</span>
                                                            <Icon name="download" size={18} className="group-hover:translate-y-0.5 transition-transform" />
                                                        </button>
                                                    </div>

                                                    <div className="p-4 bg-slate-800/40 rounded-xl border-slate-700/50">
                                                        <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Super Agent Summaries</h4>
                                                        <div className="max-h-40 overflow-y-auto space-y-2 pr-2">
                                                            {record.summaries.map((sa, idx) => (
                                                                <button
                                                                    key={idx}
                                                                    onClick={() => downloadFile(sa.filename)}
                                                                    className="flex items-center justify-between w-full px-3 py-2 bg-slate-700/30 hover:bg-slate-700/50 text-slate-300 rounded-lg text-sm transition-colors group"
                                                                >
                                                                    <span className="truncate">{sa.name}</span>
                                                                    <Icon name="download" size={14} className="group-hover:translate-y-0.5 transition-trans

 
                                        
            }
        }

    </script>    
</body>

</html>
